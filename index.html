<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - L'Institut Agro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; width: 90%; max-width: 400px; border-top: 6px solid #005a9c; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.2em; color: #333; margin: 0; }
        label { display: block; font-size: 0.9em; color: #444; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; font-size: 16px; /* Évite le zoom auto sur iPhone */ }
        .btn-login { width: 100%; padding: 14px; background-color: #005a9c; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .notice { margin-top: 20px; padding: 10px; background-color: #fcf8e3; border-left: 4px solid #8a6d3b; color: #8a6d3b; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="header">
        <h1>L'Institut Agro</h1>
        <p>Service d'authentification</p>
    </div>

    <form id="phishForm">
        <label>Identifiant numérique</label>
        <input type="text" id="username" required>
        
        <label>Mot de passe</label>
        <input type="password" id="password" required>
        
        <button type="submit" id="submitBtn" class="btn-login">CONNEXION</button>
    </form>

    <div class="notice">
        <b>Sécurité :</b> Ne saisissez vos identifiants que sur les sites officiels.
    </div>
</div>

<script>
    document.getElementById('phishForm').onsubmit = function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Capture console pour ton PC
        console.warn("CAPTURE :", user, " / ", pass);

        btn.disabled = true;
        btn.textContent = "CHARGEMENT...";

        // Redirection avec "Cache Busting" pour forcer le téléphone à charger la nouvelle page
        const targetUrl = "https://www.cybermalveillance.gouv.fr/tous-nos-contenus/actualites/quishing-hameconnage-qr-code";
        
        setTimeout(function() {
            // Méthode la plus radicale pour mobile : replace() ne laisse pas de trace dans l'historique
            // On ajoute un paramètre bidon (?v=...) pour forcer le navigateur à sortir
            window.location.replace(targetUrl + "?rel=" + Math.random());
        }, 800);
        
        return false;
    };
</script>

</body>
</html>
